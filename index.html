<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irish Interior Design | Luxury & Precision</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --charcoal: #1a1a1a; --cream: #fdfaf5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--cream); color: var(--charcoal); overflow-x: hidden; }

        /* Elegant Nav */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 8%; background: white; position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; }
        .nav-links a { text-decoration: none; color: var(--charcoal); margin-left: 35px; font-size: 0.8rem; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }

        /* Luxury Hero - Uses hero.jpg */
        .hero { height: 100vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)), url('hero.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 5rem); margin-bottom: 20px; line-height: 1.1; }
        .hero p { font-size: 1.1rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; color: #ddd; }
        
        .gold-btn { padding: 15px 40px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; transition: all 0.4s; position: relative; overflow: hidden; }
        .gold-btn:hover { background: var(--gold); color: white; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Irish Interior Design</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
    </div>
</nav>

<section class="hero">
    <h1>Artistry Meets<br>Engineering</h1>
    <p>Premium Interiors & Technical Excellence</p>
    <a href="portfolio.html" class="gold-btn">View the Portfolio</a>
</section>

</body>
</html>
