<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irish Interior Design | Home</title>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --light: #f4f4f4; }
        body { font-family: 'Arial', sans-serif; margin: 0; background: var(--light); color: var(--dark); }
        nav { display: flex; justify-content: space-between; padding: 20px 5%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: bold; letter-spacing: 2px; font-size: 1.2rem; }
        .nav-links a { text-decoration: none; color: var(--dark); margin-left: 20px; font-size: 0.9rem; text-transform: uppercase; }
        .hero { height: 80vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('hero.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; }
        .btn { padding: 12px 30px; border: 2px solid var(--gold); color: var(--gold); text-decoration: none; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: white; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">IRISH INTERIOR DESIGN</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
        </div>
    </nav>
    <section class="hero">
        <h1>Precision in Every Detail</h1>
        <p>Expert Interior Design & Technical Installation</p>
        <a href="portfolio.html" class="btn">View My Work</a>
    </section>
</body>
</html>
