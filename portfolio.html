<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Irish Interior Design</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; color: #333; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: white; border-bottom: 1px solid #eee; }
        .logo { font-weight: bold; font-size: 1.4rem; color: #1a1a1a; text-decoration: none;}
        .nav-links a { text-decoration: none; color: #1a1a1a; margin-left: 25px; font-weight: 500; }
        
        .container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        h2 { text-align: center; margin-bottom: 50px; font-size: 2.5rem; color: #1a1a1a; text-transform: uppercase; letter-spacing: 3px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 4px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 400px; object-fit: cover; }
        .card-body { padding: 25px; text-align: center; }
        .card-body h3 { font-size: 1.1rem; margin-bottom: 10px; color: #1a1a1a; }
        .card-body p { font-size: 0.9rem; color: #c5a059; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">IRISH INTERIOR DESIGN</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
        </div>
    </nav>
    <div class="container">
        <h2>Technical Portfolio</h2>
        <div class="grid">
            <div class="card"><img src="concept1.png"><div class="card-body"><p>Vision</p><h3>Modern Minimalist Concept</h3></div></div>
            <div class="card"><img src="concept2.png"><div class="card-body"><p>Vision</p><h3>Bistro Concept Moodboard</h3></div></div>
            <div class="card"><img src="lighting.jpg"><div class="card-body"><p>Execution</p><h3>Luxury Chandelier Install</h3></div></div>
            <div class="card"><img src="install.jpg"><div class="card-body"><p>Safety & Skill</p><h3>Fitting & Finishing Details</h3></div></div>
            <div class="card"><img src="marble.jpg"><div class="card-body"><p>Materials</p><h3>Premium Stone Wall Integration</h3></div></div>
        </div>
    </div>
</body>
</html>
