<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Irish Interior Design</title>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; }
        body { font-family: 'Arial', sans-serif; margin: 0; background: #fff; }
        nav { display: flex; justify-content: space-between; padding: 20px 5%; background: white; border-bottom: 1px solid #eee; }
        .nav-links a { text-decoration: none; color: var(--dark); margin-left: 20px; }
        .container { max-width: 1100px; margin: 50px auto; padding: 0 20px; }
        h2 { text-align: center; color: var(--gold); margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #f9f9f9; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-body h3 { font-size: 1rem; margin: 0; color: var(--dark); }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight:bold">IRISH INTERIOR DESIGN</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
        </div>
    </nav>
    <div class="container">
        <h2>Our Design & Technical Projects</h2>
        <div class="grid">
            <div class="card"><img src="concept1.png"><div class="card-body"><h3>Executive Concept 1</h3></div></div>
            <div class="card"><img src="concept2.png"><div class="card-body"><h3>Executive Concept 2</h3></div></div>
            <div class="card"><img src="lighting.jpg"><div class="card-body"><h3>Chandelier Installation</h3></div></div>
            <div class="card"><img src="install.jpg"><div class="card-body"><h3>Technical Fitting</h3></div></div>
            <div class="card"><img src="marble.jpg"><div class="card-body"><h3>Marble & Wall Finishing</h3></div></div>
        </div>
    </div>
</body>
</html>
